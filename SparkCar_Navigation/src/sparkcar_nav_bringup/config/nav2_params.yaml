behavior_server:
  ros__parameters:
    use_sim_time: false
    global_frame: odom
    robot_base_frame: body
    cycle_frequency: 10.0
    behavior_plugins: ["wait"]

    wait:
      plugin: "nav2_behaviors/Wait"

# 轨迹平滑
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]

    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# 生命周期管理
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - map_server
      - planner_server
      - controller_server
      - smoother_server
      - behavior_server
      - bt_navigator
