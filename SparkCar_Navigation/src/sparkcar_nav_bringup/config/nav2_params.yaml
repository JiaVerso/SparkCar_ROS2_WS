amcl:
  ros__parameters:
    use_sim_time: false 

map_server:
  ros__parameters:
    use_sim_time: false

## 全局规划器
planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0           # 每秒规划5次路线
    planner_plugins: ["GridBased"]            # 规划器别名

    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.3                          # 全局终点容忍度
      downsample_costmap: false
      allow_unknown: true                     #允许探索位置区域
      max_iterations: 1000000
      max_planning_time: 6.0                  # 最大规划延时
      motion_model_for_search: "REEDS_SHEPP"  # 允许倒车 DUBIN（只能前进）
      angle_quantization_bins: 72
      minimum_turning_radius: 0.4             #全局最小转弯半径
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0
      reverse_penalty: 2.0
      change_penalty: 0.0
      non_straight_penalty: 1.2
      cost_penalty: 2.0
      retrospective_penalty: 0.015
      lookup_table_size: 20.0
      cache_obstacle_heuristic: false
      smooth_path: true

# 局部控制器
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0            # 20hz
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3

    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 10.0             # 10s内位移不超过0.3，判断小车卡死

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.25                   # 位置容忍度
      yaw_goal_tolerance: 0.35                  # 偏航容忍度（弧度）

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.4                   # 平直路面最大线速度
      lookahead_dist: 0.8                       # 根据80cm出曲线判断角度
      min_lookahead_dist: 0.4         
      max_lookahead_dist: 1.5
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 0.4
      transform_tolerance: 0.2
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.08
      approach_velocity_scaling_dist: 0.8
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true       # 转弯自动减速
      regulated_linear_scaling_min_radius: 0.8          # 转弯限速，防止过弯停转（低于0.8转弯半径，速度0.15m/s）
      regulated_linear_scaling_min_speed: 0.15          
      use_cost_regulated_linear_velocity_scaling: false   # 关闭靠近障碍物检测
      allow_reversing: true

# 全局代价地图
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map         # 世界坐标系
      robot_base_frame: body    # 机器人坐标系
      update_frequency: 1.0
      publish_frequency: 1.0
      resolution: 0.05
      track_unknown_space: true

      footprint: "[[0.35, 0.25], [0.35, -0.25], [-0.35, -0.25], [-0.35, 0.25]]"           # 底盘物理轮廓

      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.22
        cost_scaling_factor: 3.0

      always_send_full_costmap: true

# 局部代价地图
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: lidar
      robot_base_frame: body
      update_frequency: 10.0
      publish_frequency: 5.0
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05

      # 碰撞轮廓配置
      footprint: "[[0.35, 0.25], [0.35, -0.25], [-0.35, -0.25], [-0.35, 0.25]]"

      plugins: ["voxel_layer", "inflation_layer"]

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: false
        origin_z: -0.5
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 1.5
        mark_threshold: 0
        observation_sources: body_cloud

        body_cloud:
          topic: /fastlio2/body_cloud       # 三维点云
          data_type: PointCloud2
          marking: true
          clearing: true
          observation_persistence: 0.0
          obstacle_min_range: 0.2         # 距离雷达范围
          obstacle_max_range: 3.5
          raytrace_min_range: 0.2
          raytrace_max_range: 4.0
          min_obstacle_height: 0.05
          max_obstacle_height: 1.5

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.22
        cost_scaling_factor: 3.0

      always_send_full_costmap: true

# 行为树与恢复机制
