    use_sim_time: false
    global_frame: map
    robot_base_frame: body
    odom_topic: /fastlio2/lio_odom          # 依靠雷达 fastlio2 里程计
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000

    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
